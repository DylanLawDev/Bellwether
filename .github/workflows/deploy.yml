name: deploy
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
# Serialize main-branch deploys so a slower older run can't update Cloud Run
# after a newer one and roll production back to a stale image. cancel-in-progress
# is false to avoid interrupting an in-flight migration; the newer run waits, then
# deploys last → production ends on the latest image.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false
env:
  REGION: us-central1
  REPO: bellweather
  SERVICE: bellweather-api
  JOB: bellweather-worker
jobs:
  check:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env: { POSTGRES_USER: bellweather, POSTGRES_PASSWORD: bellweather, POSTGRES_DB: bellweather }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U bellweather" --health-interval 2s
          --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL: postgresql://bellweather:bellweather@localhost:5432/bellweather
      BELLWEATHER_BUCKET: bellweather-bronze-ci
      STORAGE_EMULATOR_HOST: http://localhost:4443
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Start fake GCS server
        run: |
          docker run -d --name fake-gcs -p 4443:4443 fsouza/fake-gcs-server:1.49 \
            -scheme http -port 4443 -public-host localhost:4443
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/localhost/4443) 2>/dev/null; then echo "fake-gcs up"; exec 3>&-; break; fi
            sleep 1
          done
      - run: uv sync
      - run: uv run ruff check . && uv run ruff format --check .
      - run: uv run pytest

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet
      # One image for everything (T17): the API service runs the supervisor
      # entrypoint (uvicorn + Streamlit + Caddy); the migrate + worker Jobs below
      # override `command`, so they run the CLI directly and skip the proxy/UI.
      - name: Build & push
        run: |
          IMAGE="$REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/$REPO/app:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
      - name: Run migrations (one-off job execution)
        run: |
          gcloud run jobs deploy bellweather-migrate \
            --image "$IMAGE" --region "$REGION" \
            --service-account "${{ secrets.GCP_RUNTIME_SA }}" \
            --set-secrets DATABASE_URL=bellweather-database-url:latest \
            --set-env-vars BELLWEATHER_BUCKET=${{ secrets.GCP_BUCKET }},BELLWEATHER_OBS_BUCKET=hour \
            --command bellweather --args migrate --quiet
          gcloud run jobs execute bellweather-migrate --region "$REGION" --wait
      - name: Deploy API
        run: gcloud run services update $SERVICE --region "$REGION" --image "$IMAGE"
      - name: Deploy worker job
        run: gcloud run jobs update $JOB --region "$REGION" --image "$IMAGE"
      - name: Deploy orchestrator job
        # The orchestrator Job runs `bellweather orchestrate --once` (T27). Without
        # this step it stays pinned to the bootstrap image and the minute scheduler
        # invokes a command that image doesn't have.
        run: gcloud run jobs update bellweather-orchestrator --region "$REGION" --image "$IMAGE"
